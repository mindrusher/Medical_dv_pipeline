version: "3.9"


services:


  postgres:

    image: postgres:14

    container_name: medical_dv_postgres

    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U nsi_user -d nsi_test"
        ]

      interval: 5s

      timeout: 5s

      retries: 5


    env_file:
      - .env


    ports:
      - "5432:5432"


    volumes:

      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql


    restart: always



  loader:


    build: .


    container_name: medical_dv_loader


    env_file:
      - .env


    depends_on:

      postgres:

        condition: service_healthy